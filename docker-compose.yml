version: "3.8"

services:

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      fastapi:
        condition: service_healthy
    mem_limit: 80m
    memswap_limit: 80m
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  fastapi:
    build: ./fastapi
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/logsdb?authSource=admin
      - API_KEY=${API_KEY}
      - RATE_LIMIT_PER_DEVICE=5000
      - QUEUE_BACKPRESSURE_LIMIT=50000
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    mem_limit: 200m
    memswap_limit: 200m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # ports:                           # uncomment for external debug access
    #   - "127.0.0.1:6379:6379"        # not needed — services use Docker network
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    mem_limit: 200m
    memswap_limit: 200m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: ./worker
    restart: unless-stopped
    deploy:
      replicas: 2
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/logsdb?authSource=admin
      - WORKER_BATCH_SIZE=500
      - WORKER_FLUSH_INTERVAL_SECONDS=5
      - WORKER_MAX_RETRIES=3
      - DLQ_STREAM=logs_dlq
      - MAIN_STREAM=logs_stream
      - CONSUMER_GROUP=workers
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO}
      - ALERT_DLQ_THRESHOLD=${ALERT_DLQ_THRESHOLD:-10}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    mem_limit: 100m       # fix #5: raised from 60m — Motor + asyncio + batch needs room
    memswap_limit: 100m

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: logsdb
    command: >
      mongod
      --wiredTigerCacheSizeGB 1
      --auth
    volumes:
      - mongo_data:/data/db
    mem_limit: 1200m
    memswap_limit: 1200m
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5


  backup:
    build: ./fastapi      # reuse FastAPI image — has Python + mongodump
    restart: unless-stopped
    command: >
      sh -c "while true; do
        python3 /app/scripts/backup.py;
        sleep 86400;
      done"
    environment:
      - MONGODB_URL=mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/logsdb?authSource=admin
      - BACKUP_DIR=/backups
      - BACKUP_RETAIN_DAYS=30
    volumes:
      - ./backups:/backups
    depends_on:
      mongodb:
        condition: service_healthy
    mem_limit: 80m
    memswap_limit: 80m

volumes:
  redis_data:
  mongo_data:
