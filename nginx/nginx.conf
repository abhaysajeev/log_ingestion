# nginx/nginx.conf

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 30;

    # Reject payloads larger than 1 MB — protects worker memory
    client_max_body_size 1m;

    # Per-IP rate limiting — protects against single source floods
    limit_req_zone $binary_remote_addr zone=ingest:10m rate=100r/s;

    upstream fastapi {
        server fastapi:8000;
        keepalive 32;
    }

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location /ingest {
            limit_req zone=ingest burst=200 nodelay;
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # All other routes — dashboard, health, logs, admin, export
        location / {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }
    }
}
